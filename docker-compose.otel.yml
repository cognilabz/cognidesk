services:
  flight-demo:
    build:
      context: .
      network: host
    command: sh -c "pnpm --filter @cognidesk/flight-demo ingest:knowledge && (pnpm --filter @cognidesk/flight-demo dev:server & pnpm --filter @cognidesk/flight-demo dev --host 0.0.0.0)"
    environment:
      HOST: "0.0.0.0"
      PORT: "8787"
      NODE_ENV: "development"
      VITE_COGNIDESK_API_URL: "http://localhost:8787/api"
      COGNIDESK_OTEL: "true"
      COGNIDESK_TELEMETRY_CONTENT: "full"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENROUTER_KEY: "${OPENROUTER_KEY:-}"
    ports:
      - "5173:5173"
      - "8787:8787"
    volumes:
      - flight_demo_otel_data:/app/apps/flight-demo/.data
    depends_on:
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      tempo:
        condition: service_started

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-otlp-receiver"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.4.2
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./observability/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started

volumes:
  flight_demo_otel_data:
  grafana_data:
  loki_data:
  prometheus_data:
  tempo_data:
