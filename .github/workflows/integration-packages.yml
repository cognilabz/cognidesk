name: Integration Packages

on:
  pull_request:
    paths:
      - ".github/workflows/integration-packages.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "integrations/**"
      - "packages/**"
      - "apps/flight-demo/**"
      - "scripts/**"
      - "docs/adr/**"
      - "docs/integrations-monolith-cleanup.md"
      - "docs/provider-migration-matrix.md"
      - "docs/provider-generation.md"
      - "docs/releasing.md"
      - "website/api-reference/integrations.md"
      - "website/guides/provider-packages.md"
      - "website/guides/provider-package-migration.md"
      - "website/guides/provider-integrations-catalog.md"
      - "website/guides/omnichannel-changes.md"
      - "website/getting-started/installation.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/integration-packages.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "integrations/**"
      - "packages/**"
      - "apps/flight-demo/**"
      - "scripts/**"
      - "docs/adr/**"
      - "docs/integrations-monolith-cleanup.md"
      - "docs/provider-migration-matrix.md"
      - "docs/provider-generation.md"
      - "docs/releasing.md"
      - "website/api-reference/integrations.md"
      - "website/guides/provider-packages.md"
      - "website/guides/provider-package-migration.md"
      - "website/guides/provider-integrations-catalog.md"
      - "website/guides/omnichannel-changes.md"
      - "website/getting-started/installation.md"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build flight demo dependency graph
        run: pnpm --filter @cognidesk/flight-demo... build

      - name: Check integration architecture
        run: pnpm providers:architecture

      - name: Check monolith cleanup map
        run: pnpm providers:cleanup-map

      - name: Check flight demo static health
        run: pnpm --filter @cognidesk/flight-demo typecheck && pnpm --filter @cognidesk/flight-demo test
