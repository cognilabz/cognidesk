name: Publish SDK and Provider Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: "Publish mode to run"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stable
      dry_run:
        description: "Run checks/build and report publish decisions without publishing"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Select publish mode
        id: publish-mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ inputs.mode }}"
            dry_run="${{ inputs.dry_run }}"
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            mode="dev"
            dry_run="false"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            mode="stable"
            dry_run="false"
          else
            echo "Unsupported ref: ${GITHUB_REF}" >&2
            exit 1
          fi

          if [ "${mode}" = "stable" ] && [ "${dry_run}" != "true" ] && [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Stable publishing requires a vX.Y.Z tag." >&2
            exit 1
          fi

          if [ "${mode}" = "dev" ] && [ "${dry_run}" != "true" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Dev publishing requires the main branch." >&2
            exit 1
          fi

          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "dry_run=${dry_run}" >> "${GITHUB_OUTPUT}"
          echo "Selected ${mode} publish mode (dry_run=${dry_run})."

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm authentication
        if: steps.publish-mode.outputs.dry_run != 'true'
        run: npm whoami --registry https://registry.npmjs.org/

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare dev version
        if: steps.publish-mode.outputs.mode == 'dev'
        run: pnpm release:prepare-dev

      - name: Refresh dev lockfile
        if: steps.publish-mode.outputs.mode == 'dev'
        run: pnpm install --lockfile-only

      - name: Verify stable release
        if: steps.publish-mode.outputs.mode == 'stable'
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            pnpm release:verify-stable -- --tag "${GITHUB_REF_NAME}"
          else
            pnpm release:verify-stable
          fi

      - name: Build
        run: pnpm build

      - name: Verify integration package architecture
        run: pnpm providers:architecture

      - name: Verify provider package conformance
        run: pnpm provider-packages:check

      - name: Verify package publish smoke
        run: pnpm release:verify-packages -- --fail-size-budget

      - name: Publish packages
        shell: bash
        run: |
          args=()

          if [ "${{ steps.publish-mode.outputs.mode }}" = "dev" ]; then
            args+=(--tag dev --fail-on-existing)
          else
            args+=(--tag latest)
          fi

          if [ "${{ steps.publish-mode.outputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi

          pnpm release:publish -- "${args[@]}"
