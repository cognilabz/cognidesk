name: Publish SDK and Provider Packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run checks/build and report publish decisions without publishing"
        required: false
        default: true
        type: boolean
      publish_scope:
        description: "Stable SDK release, full workspace release, or a single package"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - all
          - provider
      provider_package:
        description: "Provider package name or integrations/{category}/{provider} directory when publish_scope=provider"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - uses: actions/checkout@v4

      - name: Select publish mode
        id: publish-mode
        shell: bash
        run: |
          mode="stable"
          dry_run="${{ inputs.dry_run }}"
          publish_scope="${{ inputs.publish_scope }}"
          provider_package="${{ inputs.provider_package }}"

          if [ "${publish_scope}" != "stable" ] && [ "${publish_scope}" != "all" ] && [ "${publish_scope}" != "provider" ]; then
            echo "publish_scope must be stable, all, or provider." >&2
            exit 1
          fi

          mode="${publish_scope}"
          if [ "${publish_scope}" = "provider" ] && [ -z "${provider_package}" ]; then
            echo "provider_package is required when publish_scope=provider." >&2
            exit 1
          fi

          if [ "${dry_run}" != "true" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Publishing requires running this workflow from the main branch." >&2
            exit 1
          fi

          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "dry_run=${dry_run}" >> "${GITHUB_OUTPUT}"
          echo "provider_package=${provider_package}" >> "${GITHUB_OUTPUT}"
          echo "Selected manual ${mode} publish mode (dry_run=${dry_run}, provider_package=${provider_package})."

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare stable version
        if: steps.publish-mode.outputs.mode == 'stable'
        run: pnpm release:prepare -- --auto-patch-existing --yes --skip-install

      - name: Prepare full workspace versions
        if: steps.publish-mode.outputs.mode == 'all'
        run: pnpm release:prepare:all

      - name: Read release version
        id: release-version
        if: steps.publish-mode.outputs.mode == 'stable' || steps.publish-mode.outputs.mode == 'all'
        shell: bash
        run: |
          version="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('packages/core/package.json', 'utf8')).version)")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "Prepared release v${version}."

      - name: Verify stable release
        if: steps.publish-mode.outputs.mode == 'stable' || steps.publish-mode.outputs.mode == 'all'
        shell: bash
        run: pnpm release:verify-stable -- --tag "${{ steps.release-version.outputs.tag }}"

      - name: Build
        run: pnpm build

      - name: Verify integration package architecture
        run: pnpm providers:architecture

      - name: Verify provider package conformance
        run: pnpm provider-packages:check

      - name: Verify package publish smoke
        run: pnpm release:verify-packages -- --fail-size-budget

      - name: Verify external consumer install
        run: pnpm release:verify-consumer-install

      - name: Refresh release lockfile
        if: (steps.publish-mode.outputs.mode == 'stable' || steps.publish-mode.outputs.mode == 'all') && steps.publish-mode.outputs.dry_run != 'true'
        run: corepack pnpm install --lockfile-only

      - name: Commit and push release version
        if: (steps.publish-mode.outputs.mode == 'stable' || steps.publish-mode.outputs.mode == 'all') && steps.publish-mode.outputs.dry_run != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "${{ steps.publish-mode.outputs.mode }}" = "all" ]; then
            diff_paths=(packages integrations apps pnpm-lock.yaml)
            commit_message="Release workspace ${{ steps.release-version.outputs.version }}"
          else
            diff_paths=(packages pnpm-lock.yaml)
            commit_message="Release SDK ${{ steps.release-version.outputs.version }}"
          fi

          if git diff --quiet -- "${diff_paths[@]}"; then
            echo "Package versions already match v${{ steps.release-version.outputs.version }}."
            exit 0
          fi

          git add -- "${diff_paths[@]}"
          git commit -m "${commit_message}"
          git push origin HEAD:main || {
            echo "Unable to push the release commit to main before npm publish." >&2
            echo "No packages have been published yet." >&2
            echo "Allow the release workflow actor to bypass the main ruleset, or merge the release version through a pull request before publishing." >&2
            exit 1
          }

      - name: Publish packages
        shell: bash
        run: |
          args=(--tag latest)

          if [ "${{ steps.publish-mode.outputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi

          if [ "${{ steps.publish-mode.outputs.mode }}" = "provider" ]; then
            args+=(--package "${{ steps.publish-mode.outputs.provider_package }}")
          fi

          pnpm release:publish -- "${args[@]}"

      - name: Create GitHub release
        if: (steps.publish-mode.outputs.mode == 'stable' || steps.publish-mode.outputs.mode == 'all') && steps.publish-mode.outputs.dry_run != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release-version.outputs.tag }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Release tag ${tag} already exists." >&2
            exit 1
          fi

          git tag "${tag}"
          git push origin "${tag}"
          gh release create "${tag}" \
            --title "${tag}" \
            --generate-notes
