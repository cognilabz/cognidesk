name: Publish SDK and Provider Packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run checks/build and report publish decisions without publishing"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - uses: actions/checkout@v4

      - name: Select publish mode
        id: publish-mode
        shell: bash
        run: |
          mode="stable"
          dry_run="${{ inputs.dry_run }}"

          if [ "${dry_run}" != "true" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Publishing requires running this workflow from the main branch." >&2
            exit 1
          fi

          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "dry_run=${dry_run}" >> "${GITHUB_OUTPUT}"
          echo "Selected manual ${mode} publish mode (dry_run=${dry_run})."

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare stable version
        run: pnpm release:prepare -- --auto-patch-existing --yes --skip-install

      - name: Read release version
        id: release-version
        shell: bash
        run: |
          version="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('packages/core/package.json', 'utf8')).version)")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "Prepared release v${version}."

      - name: Verify stable release
        shell: bash
        run: pnpm release:verify-stable -- --tag "${{ steps.release-version.outputs.tag }}"

      - name: Build
        run: pnpm build

      - name: Verify integration package architecture
        run: pnpm providers:architecture

      - name: Verify provider package conformance
        run: pnpm provider-packages:check

      - name: Verify package publish smoke
        run: pnpm release:verify-packages -- --fail-size-budget

      - name: Publish packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          args=(--tag latest)

          if [ "${{ steps.publish-mode.outputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi

          pnpm release:publish -- "${args[@]}"

      - name: Refresh release lockfile
        if: steps.publish-mode.outputs.dry_run != 'true'
        run: pnpm install --lockfile-only

      - name: Commit release version
        if: steps.publish-mode.outputs.dry_run != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- packages pnpm-lock.yaml; then
            echo "Package versions already match v${{ steps.release-version.outputs.version }}."
            exit 0
          fi

          git add packages pnpm-lock.yaml
          git commit -m "Release SDK ${{ steps.release-version.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub release
        if: steps.publish-mode.outputs.dry_run != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release-version.outputs.tag }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Release tag ${tag} already exists." >&2
            exit 1
          fi

          git tag "${tag}"
          git push origin "${tag}"
          gh release create "${tag}" \
            --title "${tag}" \
            --generate-notes
