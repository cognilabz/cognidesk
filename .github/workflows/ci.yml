name: PR CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4

      - name: Detect PR scope
        id: pr-scope
        shell: bash
        run: node scripts/classify-pr-ci.mjs "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

      - name: Install dependencies
        if: steps.pr-scope.outputs.full_check == 'true' || steps.pr-scope.outputs.provider_checks == 'true'
        run: pnpm install --frozen-lockfile

      - name: Verify package README metadata
        shell: bash
        run: |
          node --check scripts/classify-pr-ci.mjs
          node --check scripts/sync-package-readmes.mjs
          node --check scripts/verify-package-readmes.mjs
          node --check scripts/verify-package-smoke.mjs
          pnpm packages:sync-readmes
          node scripts/verify-package-readmes.mjs
          git diff --exit-code -- packages integrations

      - name: Check
        if: steps.pr-scope.outputs.full_check == 'true'
        run: pnpm check

      - name: Skip full check
        if: steps.pr-scope.outputs.full_check != 'true'
        shell: bash
        run: echo "Skipping pnpm check for README, package-version, workflow, or release-script-only changes."

      - name: Verify integration package architecture
        if: steps.pr-scope.outputs.provider_checks == 'true'
        run: pnpm providers:architecture

      - name: Verify provider package conformance
        if: steps.pr-scope.outputs.provider_checks == 'true'
        run: pnpm provider-packages:check
