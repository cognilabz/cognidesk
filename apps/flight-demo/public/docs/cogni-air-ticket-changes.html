<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Ticket change policy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <main>
      <h1>Ticket change policy</h1>
      <p>Flexible fares can be changed before departure without a service fee, although fare differences still apply.</p>
      <p>Saver fares can be changed for a service fee.</p>
      <p>Promo fares are non-changeable unless a schedule disruption affects the itinerary.</p>
    </main>
  </body>
</html>
